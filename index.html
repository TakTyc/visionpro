<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>VisionOS Cardboard VR</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      position: fixed;
      top: 0;
      left: 0;
      background: #000;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 16px;
    }

    #bgVideo {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      z-index: 0;
      display: none;
    }

    #scene-canvas {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 1;
    }

    #controls {
      position: fixed;
      bottom: 20px;
      left: 0;
      right: 0;
      z-index: 3;
      display: flex;
      justify-content: center;
      gap: 15px;
      padding: 10px;
    }

    .btn {
      background: rgba(0, 0, 0, 0.6);
      border: 1px solid rgba(255, 255, 255, 0.2);
      border-radius: 40px;
      color: #fff;
      padding: 12px 24px;
      font-size: 16px;
      cursor: pointer;
      transition: background 0.2s;
      font-weight: 500;
      backdrop-filter: blur(10px);
    }

    .btn:hover {
      background: rgba(255, 255, 255, 0.1);
    }

    .btn.hidden {
      display: none;
    }

    #appMenu {
      position: fixed;
      bottom: 100px;
      left: 0;
      right: 0;
      z-index: 3;
      display: flex;
      justify-content: center;
      gap: 15px;
      padding: 10px;
      flex-wrap: wrap;
    }

    .appIcon {
      width: 80px;
      height: 80px;
      background: rgba(255, 255, 255, 0.1);
      border-radius: 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      cursor: pointer;
      transition: background 0.2s;
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      text-align: center;
    }

    .appIcon:hover {
      background: rgba(255, 255, 255, 0.2);
    }

    .appIcon .emoji {
      font-size: 24px;
      margin-bottom: 4px;
    }
  </style>
  <script type="importmap">
    {
      "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.128.0/build/three.module.js",
        "three/addons/effects/StereoEffect.js": "https://cdn.jsdelivr.net/npm/three@0.128.0/examples/jsm/effects/StereoEffect.js",
        "three/addons/renderers/CSS2DRenderer.js": "https://cdn.jsdelivr.net/npm/three@0.128.0/examples/jsm/renderers/CSS2DRenderer.js"
      }
    }
  </script>
</head>
<body>
  <video id="bgVideo"></video>
  <canvas id="scene-canvas"></canvas>

  <div id="controls">
    <button id="cameraBtn" class="btn">📷 Включить камеру</button>
    <button id="switchCamBtn" class="btn hidden">🔄 Переключить камеру</button>
    <label class="btn">
      <input type="checkbox" id="vrToggle" style="display: none;">
      🕶️ VR Mode
    </label>
  </div>

  <div id="appMenu">
    <div class="appIcon" data-app="youtube">
      <div class="emoji">🎬</div>
      YouTube
    </div>
    <div class="appIcon" data-app="draw">
      <div class="emoji">✏️</div>
      Рисование
    </div>
    <div class="appIcon" data-app="earth">
      <div class="emoji">🌍</div>
      Космос
    </div>
    <div class="appIcon" data-app="notes">
      <div class="emoji">📝</div>
      Заметки
    </div>
    <div class="appIcon" data-app="meditate">
      <div class="emoji">🧘</div>
      Медитация
    </div>
    <div class="appIcon" data-app="monitor">
      <div class="emoji">📊</div>
      Монитор
    </div>
  </div>

  <script type="module">
    import * as THREE from 'three';
    import { StereoEffect } from 'three/addons/effects/StereoEffect.js';
    import { CSS2DRenderer, CSS2DObject } from 'three/addons/renderers/CSS2DRenderer.js';

    console.log('VisionOS Cardboard VR starting...');

    let currentStream = null;
    let currentFacing = 'environment';
    let renderer, scene, camera, effect, cssRenderer, raycaster, mouse;
    let vrMode = false;
    let handGroup, spheres = [];
    let windows = [];
    let activeTouches = new Map();

    function stopStream() {
      if (currentStream) {
        currentStream.getTracks().forEach(track => track.stop());
        currentStream = null;
      }
    }

    function startCamera() {
      stopStream();

      const constraints = {
        video: {
          facingMode: { exact: currentFacing },
          width: { ideal: 1920 },
          height: { ideal: 1080 }
        }
      };

      navigator.mediaDevices.getUserMedia(constraints)
        .then(stream => {
          currentStream = stream;
          const video = document.getElementById('bgVideo');
          video.srcObject = stream;
          video.play().catch(e => console.log('autoplay blocked', e));
          video.style.display = 'block';

          document.getElementById('cameraBtn').style.display = 'none';
          document.getElementById('switchCamBtn').style.display = 'inline-block';
          console.log('Camera started successfully');
        })
        .catch(err => {
          console.error('Camera error:', err);
          // Fallback без exact
          navigator.mediaDevices.getUserMedia({ video: { facingMode: currentFacing } })
            .then(stream => {
              currentStream = stream;
              document.getElementById('bgVideo').srcObject = stream;
              document.getElementById('bgVideo').play();
              document.getElementById('bgVideo').style.display = 'block';
              document.getElementById('cameraBtn').style.display = 'none';
              document.getElementById('switchCamBtn').style.display = 'inline-block';
              console.log('Camera started with fallback');
            })
            .catch(err2 => {
              alert('Ошибка камеры: ' + err2.message);
            });
        });
    }

    function switchCamera() {
      currentFacing = currentFacing === 'environment' ? 'user' : 'environment';
      startCamera();
    }

    function init3D() {
      renderer = new THREE.WebGLRenderer({ canvas: document.getElementById('scene-canvas'), antialias: true, alpha: true });
      renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
      renderer.setSize(window.innerWidth, window.innerHeight);
      renderer.setClearColor(0x000000, 0);

      cssRenderer = new CSS2DRenderer();
      cssRenderer.setSize(window.innerWidth, window.innerHeight);
      cssRenderer.domElement.style.position = 'absolute';
      cssRenderer.domElement.style.top = '0';
      cssRenderer.domElement.style.pointerEvents = 'none';
      document.body.appendChild(cssRenderer.domElement);

      scene = new THREE.Scene();

      camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
      camera.position.set(0, 1.6, 0);

      raycaster = new THREE.Raycaster();
      mouse = new THREE.Vector2();

      const ambient = new THREE.AmbientLight(0xffffff, 0.7);
      scene.add(ambient);

      effect = new StereoEffect(renderer);
      effect.eyeSeparation = 0.064;
      effect.setSize(window.innerWidth, window.innerHeight);

      createHandVisuals();

      window.addEventListener('resize', onResize);
      animate();
    }

    function createHandVisuals() {
      handGroup = new THREE.Group();
      scene.add(handGroup); // Добавляем после окон, чтобы быть поверх

      const fingerPositions = [
        [0, 0, 0],    // большой
        [0.1, 0, 0],  // указательный
        [0.2, 0, 0],  // средний
        [0.3, 0, 0],  // безымянный
        [0.4, 0, 0]   // мизинец
      ];

      fingerPositions.forEach(pos => {
        const sphere = new THREE.Mesh(
          new THREE.SphereGeometry(0.05),
          new THREE.MeshStandardMaterial({ color: 0xffaa88, emissive: 0x442200 })
        );
        sphere.position.set(pos[0], pos[1], pos[2]);
        sphere.visible = false;
        handGroup.add(sphere);
        spheres.push(sphere);
      });
    }

    function updateFingerPosition(index, x, y) {
      const vector = new THREE.Vector2(
        (x / window.innerWidth) * 2 - 1,
        -(y / window.innerHeight) * 2 + 1
      );
      raycaster.setFromCamera(vector, camera);
      const pos3D = raycaster.ray.direction.clone().multiplyScalar(0.6);
      spheres[index].position.copy(camera.position.clone().add(pos3D));
      spheres[index].visible = true;
    }

    function createAppWindow(appName, x, y, z) {
      const group = new THREE.Group();

      // Стеклянная панель
      const geometry = new THREE.BoxGeometry(1.2, 0.8, 0.05);
      const material = new THREE.MeshStandardMaterial({
        color: 0x88aaff,
        transparent: true,
        opacity: 0.85,
        metalness: 0.7,
        roughness: 0.2
      });
      const panel = new THREE.Mesh(geometry, material);
      group.add(panel);

      // Текст заголовка с помощью CSS2DObject
      const textDiv = document.createElement('div');
      textDiv.style.fontSize = '24px';
      textDiv.style.fontWeight = 'bold';
      textDiv.style.color = '#fff';
      textDiv.style.textAlign = 'center';
      textDiv.innerHTML = getAppTitle(appName) + '<br><small>' + getAppContent(appName) + '</small>';
      const textObject = new CSS2DObject(textDiv);
      textObject.position.set(0, 0.1, 0.03);
      group.add(textObject);

      // Кнопка закрытия — красная сфера
      const closeBtnGeometry = new THREE.SphereGeometry(0.08);
      const closeMaterial = new THREE.MeshStandardMaterial({ color: 0xff3333 });
      const closeButton = new THREE.Mesh(closeBtnGeometry, closeMaterial);
      closeButton.position.set(0.55, 0.35, 0.04);
      closeButton.userData = { isCloseButton: true, windowGroup: group };
      group.add(closeButton);

      group.position.set(x, y, z);
      scene.add(group);

      windows.push(group);
      console.log('Window created:', appName);
      return group;
    }

    function getAppTitle(app) {
      const titles = {
        youtube: 'YouTube',
        draw: 'Рисование',
        earth: 'Космос',
        notes: 'Заметки',
        meditate: 'Медитация',
        monitor: 'Монитор'
      };
      return titles[app] || 'Приложение';
    }

    function getAppContent(app) {
      const contents = {
        youtube: 'Видео и музыка',
        draw: 'Творчество',
        earth: 'Планета Земля',
        notes: 'Ваши записи',
        meditate: 'Релакс',
        monitor: 'Статистика'
      };
      return contents[app] || 'Содержимое';
    }

    function onClickWindow(event) {
      mouse.x = (event.clientX / renderer.domElement.clientWidth) * 2 - 1;
      mouse.y = -(event.clientY / renderer.domElement.clientHeight) * 2 + 1;

      raycaster.setFromCamera(mouse, camera);
      const intersects = raycaster.intersectObjects(scene.children, true);

      for (let hit of intersects) {
        if (hit.object.userData.isCloseButton) {
          const windowGroup = hit.object.userData.windowGroup;
          scene.remove(windowGroup);
          windows = windows.filter(w => w !== windowGroup);
          // Очищаем ресурсы
          windowGroup.children.forEach(child => {
            if (child.isMesh) {
              child.geometry.dispose();
              child.material.dispose();
            }
          });
          console.log('Window closed');
          return;
        }
      }
    }

    function toggleVR(enable) {
      vrMode = enable;
      if (vrMode) {
        effect.setSize(window.innerWidth, window.innerHeight);
      }
      console.log('VR mode:', vrMode);
    }

    function onResize() {
      const width = window.innerWidth;
      const height = window.innerHeight;

      renderer.setSize(width, height);
      if (effect) effect.setSize(width, height);
      if (cssRenderer) cssRenderer.setSize(width, height);
      camera.aspect = width / height;
      camera.updateProjectionMatrix();
      console.log('Resized to', width, height);
    }

    function animate() {
      requestAnimationFrame(animate);
      if (vrMode) {
        effect.render(scene, camera);
      } else {
        renderer.render(scene, camera);
      }
      cssRenderer.render(scene, camera);
    }

    // Event listeners
    document.getElementById('cameraBtn').onclick = function() {
      startCamera();
    };

    document.getElementById('switchCamBtn').onclick = function() {
      switchCamera();
    };

    document.getElementById('vrToggle').onchange = function(e) {
      toggleVR(e.target.checked);
    };

    document.querySelectorAll('.appIcon').forEach(icon => {
      icon.onclick = function() {
        const appName = this.dataset.app;
        const newWindow = createAppWindow(appName,
          (Math.random() - 0.5) * 2,  // случайный X
          1,                          // Y
          -2.5                        // Z
        );
      };
    });

    window.addEventListener('click', onClickWindow);

    window.addEventListener('touchstart', (e) => {
      e.preventDefault();
      for (let i = 0; i < e.touches.length && i < 5; i++) {
        const touch = e.touches[i];
        activeTouches.set(touch.identifier, i);
        updateFingerPosition(i, touch.clientX, touch.clientY);
      }
    });

    window.addEventListener('touchmove', (e) => {
      e.preventDefault();
      for (let i = 0; i < e.touches.length && i < 5; i++) {
        const touch = e.touches[i];
        const fingerIndex = activeTouches.get(touch.identifier);
        if (fingerIndex !== undefined) {
          updateFingerPosition(fingerIndex, touch.clientX, touch.clientY);
        }
      }
    });

    window.addEventListener('touchend', (e) => {
      e.preventDefault();
      spheres.forEach(sphere => sphere.visible = false);
      activeTouches.clear();
    });

    // Инициализация
    init3D();
    console.log('VisionOS initialized');
  </script>
</body>
</html>
