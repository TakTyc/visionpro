<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Vision Pro Cardboard VR</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      position: fixed;
      top: 0;
      left: 0;
      background: #000;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 16px;
    }

    #bgVideo {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      z-index: 0;
      display: none;
    }

    #scene-canvas {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 1;
    }

    #controls {
      position: fixed;
      bottom: 20px;
      left: 0;
      right: 0;
      z-index: 3;
      display: flex;
      justify-content: center;
      gap: 15px;
      padding: 10px;
    }

    .btn {
      background: rgba(0, 0, 0, 0.6);
      border: 1px solid rgba(255, 255, 255, 0.2);
      border-radius: 40px;
      color: #fff;
      padding: 12px 24px;
      font-size: 16px;
      cursor: pointer;
      transition: background 0.2s;
      font-weight: 500;
    }

    .btn:hover {
      background: rgba(255, 255, 255, 0.1);
    }

    .btn.hidden {
      display: none;
    }

    #app-menu {
      position: fixed;
      bottom: 100px;
      left: 0;
      right: 0;
      z-index: 3;
      display: flex;
      justify-content: center;
      gap: 15px;
      padding: 10px;
    }

    .app-icon {
      width: 70px;
      height: 70px;
      background: rgba(255, 255, 255, 0.1);
      border-radius: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
      cursor: pointer;
      transition: background 0.2s;
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.1);
    }

    .app-icon:hover {
      background: rgba(255, 255, 255, 0.2);
    }

    .window {
      background: rgba(0, 0, 0, 0.8);
      border-radius: 20px;
      padding: 20px;
      min-width: 300px;
      min-height: 200px;
      position: relative;
      backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      font-size: 18px;
      color: #fff;
    }

    .window .close-btn {
      position: absolute;
      top: 10px;
      right: 10px;
      background: rgba(255, 0, 0, 0.6);
      border: none;
      border-radius: 50%;
      width: 30px;
      height: 30px;
      color: #fff;
      font-size: 16px;
      cursor: pointer;
    }

    .window.dragging {
      opacity: 0.8;
    }
  </style>
  <script type="importmap">
    {
      "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.128.0/build/three.module.js",
        "three/addons/effects/StereoEffect.js": "https://cdn.jsdelivr.net/npm/three@0.128.0/examples/jsm/effects/StereoEffect.js",
        "three/addons/renderers/CSS2DRenderer.js": "https://cdn.jsdelivr.net/npm/three@0.128.0/examples/jsm/renderers/CSS2DRenderer.js"
      }
    }
  </script>
</head>
<body>
  <video id="bgVideo"></video>
  <canvas id="scene-canvas"></canvas>

  <div id="controls">
    <button id="cameraBtn" class="btn">📷 Включить камеру</button>
    <button id="switchCamBtn" class="btn hidden">🔄 Переключить камеру</button>
    <label class="btn">
      <input type="checkbox" id="vrToggle" style="display: none;">
      🕶️ VR Mode
    </label>
  </div>

  <div id="app-menu">
    <div class="app-icon" data-app="youtube">📺</div>
    <div class="app-icon" data-app="drawing">🎨</div>
    <div class="app-icon" data-app="earth">🌍</div>
    <div class="app-icon" data-app="notes">📝</div>
    <div class="app-icon" data-app="meditation">🧘</div>
    <div class="app-icon" data-app="monitor">📊</div>
  </div>

  <script type="module">
    import * as THREE from 'three';
    import { StereoEffect } from 'three/addons/effects/StereoEffect.js';
    import { CSS2DRenderer, CSS2DObject } from 'three/addons/renderers/CSS2DRenderer.js';

    let videoStream = null;
    let currentCamera = 'environment';
    let renderer, scene, camera, effect, cssRenderer;
    let vrActive = false;
    let handGroup, handSpheres = [], handLines = [];
    let windows = [];
    let draggingWindow = null;
    let dragOffset = new THREE.Vector3();

    async function initCamera(facingMode) {
      if (videoStream) {
        videoStream.getTracks().forEach(track => track.stop());
      }
      const constraints = {
        video: { facingMode: { exact: facingMode } }
      };
      try {
        videoStream = await navigator.mediaDevices.getUserMedia(constraints);
        const videoEl = document.getElementById('bgVideo');
        videoEl.srcObject = videoStream;
        videoEl.play();
        videoEl.style.display = 'block';
        return true;
      } catch (err) {
        const fallback = { video: { facingMode: facingMode } };
        videoStream = await navigator.mediaDevices.getUserMedia(fallback);
        document.getElementById('bgVideo').srcObject = videoStream;
        document.getElementById('bgVideo').play();
        document.getElementById('bgVideo').style.display = 'block';
        return true;
      }
    }

    function initThree() {
      renderer = new THREE.WebGLRenderer({ canvas: document.getElementById('scene-canvas'), antialias: true, alpha: true });
      renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
      renderer.setSize(window.innerWidth, window.innerHeight);
      renderer.setClearColor(0x000000, 0);

      cssRenderer = new CSS2DRenderer();
      cssRenderer.setSize(window.innerWidth, window.innerHeight);
      cssRenderer.domElement.style.position = 'absolute';
      cssRenderer.domElement.style.top = '0';
      cssRenderer.domElement.style.pointerEvents = 'none';
      document.body.appendChild(cssRenderer.domElement);

      scene = new THREE.Scene();

      camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
      camera.position.set(0, 1.6, 0);

      const ambient = new THREE.AmbientLight(0xffffff, 0.7);
      scene.add(ambient);

      effect = new StereoEffect(renderer);
      effect.eyeSeparation = 0.064;
      effect.setSize(window.innerWidth, window.innerHeight);

      createHandVisuals();

      window.addEventListener('resize', onResize);
      animate();
    }

    function createHandVisuals() {
      handGroup = new THREE.Group();
      scene.add(handGroup);

      const sphereMaterial = new THREE.MeshStandardMaterial({ color: 0xff0000, transparent: true, opacity: 0.8 });
      for (let i = 0; i < 5; i++) {
        const sphere = new THREE.Mesh(new THREE.SphereGeometry(0.03, 12, 12), sphereMaterial);
        sphere.visible = false;
        handGroup.add(sphere);
        handSpheres.push(sphere);
      }

      const lineMaterial = new THREE.LineBasicMaterial({ color: 0xff0000, linewidth: 2 });
      for (let i = 0; i < 4; i++) {
        const geometry = new THREE.BufferGeometry();
        const positions = new Float32Array(6);
        geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
        const line = new THREE.Line(geometry, lineMaterial);
        line.visible = false;
        handGroup.add(line);
        handLines.push(line);
      }
    }

    function updateHands(touches) {
      if (touches.length === 0) {
        handSpheres.forEach(s => s.visible = false);
        handLines.forEach(l => l.visible = false);
        return;
      }

      touches.slice(0, 5).forEach((touch, i) => {
        const x = (touch.clientX / window.innerWidth) * 2 - 1;
        const y = -(touch.clientY / window.innerHeight) * 2 + 1;
        const vector = new THREE.Vector3(x, y, 0.5);
        vector.unproject(camera);
        const dir = vector.sub(camera.position).normalize();
        const distance = 0.5;
        const pos = camera.position.clone().add(dir.multiplyScalar(distance));
        handSpheres[i].position.copy(pos);
        handSpheres[i].visible = true;
      });

      for (let i = 0; i < Math.min(touches.length - 1, 4); i++) {
        const pos1 = handSpheres[i].position;
        const pos2 = handSpheres[i + 1].position;
        const positions = handLines[i].geometry.attributes.position.array;
        positions[0] = pos1.x; positions[1] = pos1.y; positions[2] = pos1.z;
        positions[3] = pos2.x; positions[4] = pos2.y; positions[5] = pos2.z;
        handLines[i].geometry.attributes.position.needsUpdate = true;
        handLines[i].visible = true;
      }
    }

    function createWindow(appType) {
      const windowDiv = document.createElement('div');
      windowDiv.className = 'window';
      windowDiv.innerHTML = `<button class="close-btn">×</button><h2>${getAppTitle(appType)}</h2><p>${getAppContent(appType)}</p>`;

      const windowObject = new CSS2DObject(windowDiv);
      windowObject.position.set(0, 1.5, -2.5);
      scene.add(windowObject);
      windows.push(windowObject);

      windowDiv.querySelector('.close-btn').onclick = () => {
        scene.remove(windowObject);
        windows = windows.filter(w => w !== windowObject);
      };

      windowDiv.addEventListener('touchstart', (e) => {
        draggingWindow = windowObject;
        const rect = windowDiv.getBoundingClientRect();
        dragOffset.set(e.touches[0].clientX - rect.left, e.touches[0].clientY - rect.top, 0);
        windowDiv.classList.add('dragging');
      });

      windowDiv.addEventListener('touchmove', (e) => {
        if (draggingWindow) {
          const x = (e.touches[0].clientX / window.innerWidth) * 2 - 1;
          const y = -(e.touches[0].clientY / window.innerHeight) * 2 + 1;
          const vector = new THREE.Vector3(x, y, 0.5);
          vector.unproject(camera);
          const dir = vector.sub(camera.position).normalize();
          const pos = camera.position.clone().add(dir.multiplyScalar(2.5));
          draggingWindow.position.copy(pos);
        }
      });

      windowDiv.addEventListener('touchend', () => {
        draggingWindow = null;
        windowDiv.classList.remove('dragging');
      });
    }

    function getAppTitle(app) {
      const titles = {
        youtube: 'YouTube',
        drawing: 'Рисование',
        earth: 'Земля',
        notes: 'Заметки',
        meditation: 'Медитация',
        monitor: 'Монитор'
      };
      return titles[app] || 'Приложение';
    }

    function getAppContent(app) {
      const contents = {
        youtube: 'Здесь будет плеер YouTube.',
        drawing: 'Инструменты для рисования.',
        earth: '3D модель Земли.',
        notes: 'Ваши заметки.',
        meditation: 'Релаксация и медитация.',
        monitor: 'Системная информация.'
      };
      return contents[app] || 'Содержимое приложения.';
    }

    function onResize() {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
      cssRenderer.setSize(window.innerWidth, window.innerHeight);
      if (effect) effect.setSize(window.innerWidth, window.innerHeight);
    }

    function animate() {
      requestAnimationFrame(animate);
      if (vrActive && effect) {
        effect.render(scene, camera);
      } else {
        renderer.render(scene, camera);
      }
      cssRenderer.render(scene, camera);
    }

    // Event listeners
    document.getElementById('cameraBtn').onclick = async () => {
      try {
        await initCamera(currentCamera);
        document.getElementById('cameraBtn').style.display = 'none';
        document.getElementById('switchCamBtn').style.display = 'inline-block';
        initThree();
      } catch (e) {
        alert('Ошибка: ' + e.message);
      }
    };

    document.getElementById('switchCamBtn').onclick = async () => {
      currentCamera = currentCamera === 'environment' ? 'user' : 'environment';
      try {
        await initCamera(currentCamera);
      } catch (e) {
        alert('Ошибка переключения: ' + e.message);
      }
    };

    document.getElementById('vrToggle').onchange = (e) => {
      vrActive = e.target.checked;
    };

    document.querySelectorAll('.app-icon').forEach(icon => {
      icon.onclick = () => {
        createWindow(icon.dataset.app);
      };
    });

    document.addEventListener('touchstart', (e) => updateHands(e.touches));
    document.addEventListener('touchmove', (e) => updateHands(e.touches));
    document.addEventListener('touchend', (e) => updateHands(e.touches));
  </script>
</body>
</html>
