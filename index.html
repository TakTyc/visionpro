<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>VisionOS Cardboard VR Final</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      position: fixed;
      top: 0;
      left: 0;
      background: #000;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 16px;
    }
  </style>
  <script type="importmap">
    {
      "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.128.0/build/three.module.js",
        "three/addons/effects/StereoEffect.js": "https://cdn.jsdelivr.net/npm/three@0.128.0/examples/jsm/effects/StereoEffect.js"
      }
    }
  </script>
</head>
<body>
  <script type="module">
    import * as THREE from 'three';
    import { StereoEffect } from 'three/addons/effects/StereoEffect.js';

    console.log('VisionOS Cardboard VR Final starting...');

    // ГЛОБАЛЬНЫЕ ПЕРЕМЕННЫЕ
    let scene, camera, renderer, effect, vrMode = false;
    let windows = [];
    let fingers = [];
    let activeTouches = [];

    // КАМЕРА НА iOS — ЕБАНЫЙ РУКОВОДСТВО
    (function setupCamera() {
        console.log('ЕБАНЫЙ КОД КАМЕРЫ ЗАГРУЖАЕТСЯ');
        
        // СОЗДАЁМ ВИДЕОЭЛЕМЕНТ
        const videoElement = document.createElement('video');
        videoElement.id = 'bgVideo';
        videoElement.setAttribute('autoplay', '');
        videoElement.setAttribute('playsinline', ''); // БЕЗ ЭТОГО НИХУЯ НЕ РАБОТАЕТ НА iOS
        videoElement.setAttribute('muted', '');
        videoElement.muted = true;
        videoElement.style.cssText = 'position: fixed; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; z-index: 0;';
        
        // ВСТАВЛЯЕМ В НАЧАЛО BODY
        if (document.body.firstChild) {
            document.body.insertBefore(videoElement, document.body.firstChild);
        } else {
            document.body.appendChild(videoElement);
        }
        
        let currentStream = null;
        let currentCamera = 'environment'; // ЗАДНЯЯ, БЛЯТЬ
        
        // ФУНКЦИЯ ЗАПУСКА КАМЕРЫ — СИНХРОННАЯ, БЕЗ ЕБАНЫХ ASYNC/AWAIT
        window.startCamera = function() {
            console.log('ПЫТАЮСЬ ВКЛЮЧИТЬ КАМЕРУ, БЛЯТЬ');
            
            // ОСТАНАВЛИВАЕМ СТАРЫЙ ПОТОК
            if (currentStream) {
                currentStream.getTracks().forEach(track => track.stop());
                currentStream = null;
            }
            
            // iOS ХОЧЕТ ТАКИЕ НАСТРОЙКИ
            const constraints = {
                video: {
                    facingMode: { exact: currentCamera },
                    width: { ideal: 1280 },
                    height: { ideal: 720 }
                }
            };
            
            // ЗАПУСКАЕМ КАМЕРУ, БЛЯТЬ
            navigator.mediaDevices.getUserMedia(constraints)
                .then(function(stream) {
                    console.log('КАМЕРА РАБОТАЕТ, ЕБАТЬ КОЛОТИТЬ');
                    currentStream = stream;
                    videoElement.srcObject = stream;
                    videoElement.play().catch(function(e) {
                        console.log('PLAY ERROR:', e);
                        videoElement.play();
                    });
                    
                    // МЕНЯЕМ КНОПКИ
                    const camBtn = document.getElementById('cameraBtn');
                    const switchBtn = document.getElementById('switchCamBtn');
                    if (camBtn) camBtn.style.display = 'none';
                    if (switchBtn) switchBtn.style.display = 'inline-block';
                })
                .catch(function(err) {
                    console.error('ОШИБКА КАМЕРЫ, БЛЯТЬ:', err);
                    // ПРОБУЕМ БЕЗ exact — ЕБАНЫЙ FALLBACK
                    navigator.mediaDevices.getUserMedia({ video: { facingMode: currentCamera } })
                        .then(function(stream) {
                            console.log('FALLBACK СРАБОТАЛ, УРА, БЛЯТЬ');
                            currentStream = stream;
                            videoElement.srcObject = stream;
                            videoElement.play();
                        })
                        .catch(function(err2) {
                            console.error('ВСЁ ПЛОХО, БЛЯТЬ:', err2);
                            alert('НЕ МОГУ ВКЛЮЧИТЬ КАМЕРУ. ПРОВЕРЬ РАЗРЕШЕНИЯ В НАСТРОЙКАХ SAFARI, БЛЯТЬ.');
                        });
                });
        };
        
        // ПЕРЕКЛЮЧЕНИЕ КАМЕРЫ
        window.switchCamera = function() {
            console.log('ПЕРЕКЛЮЧАЮ КАМЕРУ, БЛЯТЬ');
            currentCamera = currentCamera === 'environment' ? 'user' : 'environment';
            startCamera();
        };
    })();

    // СОЗДАЁМ КНОПКИ ЕБАНЫЕ
    const btnContainer = document.createElement('div');
    btnContainer.style.cssText = 'position: fixed; bottom: 30px; left: 0; right: 0; display: flex; justify-content: center; gap: 15px; z-index: 100;';

    const cameraButton = document.createElement('button');
    cameraButton.id = 'cameraBtn';
    cameraButton.textContent = '📷 ВКЛЮЧИТЬ КАМЕРУ, БЛЯТЬ';
    cameraButton.style.cssText = 'padding: 15px 30px; background: rgba(0,0,0,0.8); color: white; border: none; border-radius: 50px; font-size: 18px; font-weight: bold; backdrop-filter: blur(10px);';

    const switchButton = document.createElement('button');
    switchButton.id = 'switchCamBtn';
    switchButton.textContent = '🔄 ПЕРЕКЛЮЧИТЬ, БЛЯТЬ';
    switchButton.style.cssText = 'padding: 15px 30px; background: rgba(0,0,0,0.8); color: white; border: none; border-radius: 50px; font-size: 18px; font-weight: bold; backdrop-filter: blur(10px); display: none;';

    const vrToggle = document.createElement('button');
    vrToggle.id = 'vrToggleBtn';
    vrToggle.textContent = '🥽 VR РЕЖИМ, БЛЯТЬ';
    vrToggle.style.cssText = 'padding: 15px 30px; background: rgba(0,0,0,0.8); color: white; border: none; border-radius: 50px; font-size: 18px; font-weight: bold; backdrop-filter: blur(10px);';

    btnContainer.appendChild(cameraButton);
    btnContainer.appendChild(switchButton);
    btnContainer.appendChild(vrToggle);
    document.body.appendChild(btnContainer);

    // НАЗНАЧАЕМ ОБРАБОТЧИКИ — БЕЗ ВСЯКОЙ ЕБАНОЙ АСИНХРОННОСТИ
    cameraButton.onclick = function() {
        console.log('КНОПКА НАЖАТА, ЕБУЧИЙ В РОТ');
        startCamera();
    };

    switchButton.onclick = function() {
        console.log('ПЕРЕКЛЮЧАЮ, БЛЯТЬ');
        switchCamera();
    };

    // VR РЕЖИМ — ЕЩЁ ОДНА ЕБАНАЯ ТЕМА
    function initThreeJS() {
        scene = new THREE.Scene();
        scene.background = null; // ПРОЗРАЧНЫЙ, ЧТОБЫ ВИДНО БЫЛО КАМЕРУ
        
        camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 1.6, 0);
        
        renderer = new THREE.WebGLRenderer({ alpha: true }); // alpha true — ПРОЗРАЧНЫЙ
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setClearColor(0x000000, 0); // ПОЛНОСТЬЮ ПРОЗРАЧНЫЙ
        document.body.appendChild(renderer.domElement);
        renderer.domElement.style.position = 'fixed';
        renderer.domElement.style.top = '0';
        renderer.domElement.style.left = '0';
        renderer.domElement.style.zIndex = '1';
        renderer.domElement.style.pointerEvents = 'none'; // ЧТОБЫ КНОПКИ БЫЛИ ДОСТУПНЫ
        
        effect = new StereoEffect(renderer);
        effect.eyeSeparation = 0.064; // НЕ МЕНЯТЬ, БЛЯТЬ
    }

    function toggleVR(enable) {
        vrMode = enable;
        if (vrMode) {
            effect.setSize(window.innerWidth, window.innerHeight);
        }
    }

    function animate() {
        if (vrMode) {
            effect.render(scene, camera);
        } else {
            renderer.render(scene, camera);
        }
        requestAnimationFrame(animate);
    }

    vrToggle.onclick = function() {
        vrMode = !vrMode;
        this.textContent = vrMode ? '❌ ВЫКЛЮЧИТЬ VR, БЛЯТЬ' : '🥽 VR РЕЖИМ, БЛЯТЬ';
        toggleVR(vrMode);
        console.log('VR РЕЖИМ:', vrMode ? 'ВКЛЮЧЕН' : 'ВЫКЛЮЧЕН');
    };

    // ОКНА ПРИЛОЖЕНИЙ — С КРЕСТИКОМ, БЛЯТЬ
    function createAppWindow(title, color, x, y, z) {
        const group = new THREE.Group();
        
        // ОСНОВНАЯ ПАНЕЛЬ
        const geometry = new THREE.BoxGeometry(1.2, 0.8, 0.05);
        const material = new THREE.MeshStandardMaterial({
            color: color,
            transparent: true,
            opacity: 0.85,
            metalness: 0.7,
            roughness: 0.2,
            emissive: 0x111111
        });
        const panel = new THREE.Mesh(geometry, material);
        group.add(panel);
        
        // РАМКА БЕЛАЯ (ДЛЯ КРАСОТЫ)
        const edgesGeo = new THREE.EdgesGeometry(geometry);
        const edgesMat = new THREE.LineBasicMaterial({ color: 0xffffff });
        const wireframe = new THREE.LineSegments(edgesGeo, edgesMat);
        group.add(wireframe);
        
        // ТЕКСТ ЗАГОЛОВКА (ЧЕРЕЗ CANVAS ТЕКСТУРУ)
        const canvas = document.createElement('canvas');
        canvas.width = 512;
        canvas.height = 128;
        const ctx = canvas.getContext('2d');
        ctx.fillStyle = '#ffffff';
        ctx.font = 'Bold 32px Arial';
        ctx.fillText(title, 20, 50);
        const texture = new THREE.CanvasTexture(canvas);
        const textMat = new THREE.MeshStandardMaterial({ map: texture, side: THREE.DoubleSide });
        const textPlane = new THREE.Mesh(new THREE.PlaneGeometry(0.8, 0.2), textMat);
        textPlane.position.set(0, 0.25, 0.03);
        group.add(textPlane);
        
        // ЕБАНЫЙ КРЕСТИК ДЛЯ ЗАКРЫТИЯ
        const closeBtnGeo = new THREE.SphereGeometry(0.08, 16, 16);
        const closeBtnMat = new THREE.MeshStandardMaterial({ color: 0xff3333, emissive: 0x441111 });
        const closeButton = new THREE.Mesh(closeBtnGeo, closeBtnMat);
        closeButton.position.set(0.55, 0.35, 0.04);
        closeButton.userData = { type: 'closeButton', parentWindow: group };
        group.add(closeButton);
        
        group.position.set(x, y, z);
        scene.add(group);
        windows.push(group);
        
        return group;
    }

    // ОБРАБОТЧИК КЛИКОВ ДЛЯ ЗАКРЫТИЯ ОКОН
    window.addEventListener('click', function(event) {
        // НЕ РАБОТАЕМ, ЕСЛИ КЛИК ПО КНОПКЕ
        if (event.target && event.target.id) return;
        
        const mouse = new THREE.Vector2();
        mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
        mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;
        
        const raycaster = new THREE.Raycaster();
        raycaster.setFromCamera(mouse, camera);
        
        const intersects = raycaster.intersectObjects(scene.children, true);
        
        for (let i = 0; i < intersects.length; i++) {
            const hit = intersects[i];
            if (hit.object.userData && hit.object.userData.type === 'closeButton') {
                const windowGroup = hit.object.userData.parentWindow;
                // УДАЛЯЕМ ОКНО ИЗ СЦЕНЫ
                scene.remove(windowGroup);
                // УДАЛЯЕМ ИЗ МАССИВА
                const index = windows.indexOf(windowGroup);
                if (index > -1) windows.splice(index, 1);
                console.log('ОКНО ЗАКРЫТО, БЛЯТЬ');
                break;
            }
        }
    });

    // МЕНЮ ПРИЛОЖЕНИЙ
    const appMenu = document.createElement('div');
    appMenu.style.cssText = 'position: fixed; bottom: 100px; left: 0; right: 0; display: flex; justify-content: center; gap: 15px; z-index: 100; flex-wrap: wrap; padding: 10px;';

    const apps = [
        { name: '🎬 YouTube', color: 0xff3333, title: 'YOUTUBE' },
        { name: '✏️ РИСОВАНИЕ', color: 0x33ff33, title: 'РИСУЙ' },
        { name: '🌍 КОСМОС', color: 0x3333ff, title: 'ЗЕМЛЯ' },
        { name: '📝 ЗАМЕТКИ', color: 0xffaa33, title: 'ЗАМЕТКИ' },
        { name: '🧘 МЕДИТАЦИЯ', color: 0xaa33ff, title: 'МММ' },
        { name: '📊 МОНИТОР', color: 0x33ffaa, title: 'FPS' }
    ];

    apps.forEach((app, index) => {
        const btn = document.createElement('button');
        btn.textContent = app.name;
        btn.style.cssText = 'padding: 12px 20px; background: rgba(0,0,0,0.7); color: white; border: none; border-radius: 40px; font-size: 16px; backdrop-filter: blur(10px);';
        btn.onclick = function() {
            const angle = (index / apps.length) * Math.PI * 2;
            const x = Math.sin(angle) * 1.5;
            const z = -2.5 + Math.cos(angle) * 0.5;
            createAppWindow(app.title, app.color, x, 1, z);
            console.log('ОКНО ОТКРЫТО, ЕБАТЬ:', app.name);
        };
        appMenu.appendChild(btn);
    });

    document.body.appendChild(appMenu);

    // РУКИ — ПРИ КАСАНИИ ЭКРАНА
    const handGroup = new THREE.Group();
    scene.add(handGroup);

    const fingerColors = [0xff8888, 0xffaa88, 0xffcc88, 0x88ff88, 0x88aaff];

    for (let i = 0; i < 5; i++) {
        const sphere = new THREE.Mesh(
            new THREE.SphereGeometry(0.07, 16, 16),
            new THREE.MeshStandardMaterial({ color: fingerColors[i], emissive: 0x331100 })
        );
        sphere.position.set(i * 0.1 - 0.2, 0, 0);
        handGroup.add(sphere);
        fingers.push(sphere);
    }

    // ЛИНИИ МЕЖДУ ПАЛЬЦАМИ
    const lineMaterial = new THREE.LineBasicMaterial({ color: 0xffaa88 });
    for (let i = 0; i < fingers.length - 1; i++) {
        const points = [];
        points.push(fingers[i].position.clone());
        points.push(fingers[i+1].position.clone());
        const geometry = new THREE.BufferGeometry().setFromPoints(points);
        const line = new THREE.Line(geometry, lineMaterial);
        handGroup.add(line);
    }

    window.addEventListener('touchstart', function(e) {
        e.preventDefault();
        activeTouches = [];
        for (let i = 0; i < Math.min(e.touches.length, 5); i++) {
            const touch = e.touches[i];
            activeTouches.push({ id: touch.identifier, fingerIndex: i, x: touch.clientX, y: touch.clientY });
            updateFingerPosition(i, touch.clientX, touch.clientY);
        }
    });

    window.addEventListener('touchmove', function(e) {
        e.preventDefault();
        for (let i = 0; i < e.touches.length && i < 5; i++) {
            const touch = e.touches[i];
            updateFingerPosition(i, touch.clientX, touch.clientY);
        }
    });

    window.addEventListener('touchend', function(e) {
        e.preventDefault();
        // ПРЯЧЕМ РУКИ
        for (let i = 0; i < fingers.length; i++) {
            fingers[i].position.set(i * 0.1 - 0.2, -1, 0.5);
        }
        activeTouches = [];
    });

    function updateFingerPosition(index, x, y) {
        const vector = new THREE.Vector2(
            (x / window.innerWidth) * 2 - 1,
            -(y / window.innerHeight) * 2 + 1
        );
        const raycaster = new THREE.Raycaster();
        raycaster.setFromCamera(vector, camera);
        const pos3D = raycaster.ray.direction.clone().multiplyScalar(0.6);
        fingers[index].position.copy(camera.position.clone().add(pos3D));
        
        // ОБНОВЛЯЕМ ЛИНИИ
        for (let i = 0; i < fingers.length - 1; i++) {
            const points = [fingers[i].position.clone(), fingers[i+1].position.clone()];
            handGroup.children[fingers.length + i].geometry.dispose();
            handGroup.children[fingers.length + i].geometry = new THREE.BufferGeometry().setFromPoints(points);
        }
    }

    // ИНИЦИАЛИЗАЦИЯ
    initThreeJS();
    animate();
    console.log('VisionOS initialized');
  </script>
</body>
</html>
